name: Build KingDani APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android Project
        run: |
          mkdir -p app/src/main/assets
          cp index.html app/src/main/assets/
          mkdir -p app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">KingDani</string></resources>' > app/src/main/res/values/strings.xml
          mkdir -p app/src/main
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.kingdani.app"><application android:label="KingDani"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml
          
          # קובץ הגדרות פשוט שמתאים לכל גרסה
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }
          allprojects { repositories { google(); mavenCentral() } }
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.kingdani.app'
              defaultConfig {
                  applicationId 'com.kingdani.app'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }" > app/build.gradle
          
          echo "include ':app'" > settings.gradle

      - name: Build APK
        run: |
          # שימוש בגרסה ספציפית של גרדל שקיימת בשרת
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KingDani-App
          path: app/build/outputs/apk/debug/app-debug.apk
