name: Build KingDani APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Basic Android
        run: |
          mkdir -p app/src/main/assets
          cp index.html app/src/main/assets/
          mkdir -p app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">KingDani</string></resources>' > app/src/main/res/values/strings.xml
          mkdir -p app/src/main
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.kingdani.app"><application android:label="KingDani"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

      - name: Build with Gradle
        run: |
          # פקודה שיוצרת את הכל בלי להסתמך על קבצים שהעלית
          gradle init --type basic
          gradle assembleDebug || echo "בנייה ראשונית"
