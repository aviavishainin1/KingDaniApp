buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    compileSdk 33
    namespace 'com.kingdani.app'
    defaultConfig {
        applicationId 'com.kingdani.app'
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName '1.0'
    }
}
